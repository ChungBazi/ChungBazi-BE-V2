name: CD workflow

on:
  workflow_run:
    workflows:
      - CI workflow
    types:
      - completed
    branches:
      - develop

jobs:
  build:
    name: Build and Push Docker Image
    if: github.repository == 'ChungBazi/ChungBazi-BE-V2' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: make application.yml
        run: |
          cd ./src/main/resources
          touch ./application.yml
          echo "${{ secrets.APPLICATION_DEV_YML }}" > ./application.yml
        shell: bash

      - name: Grant gradlew permission
        run: chmod +x ./gradlew

      - name: Build JAR with Gradle
        run: ./gradlew build -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Login DockerHub
        run:
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKER_REPO }}:${{ github.sha }}
            ${{ secrets.DOCKER_REPO }}:latest

      - name: Deploy to server with Docker
        uses: appleboy/ssh-action@master
        env:
          DOCKER_REPO: ${{ secrets.DOCKER_REPO }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKER_REPO
          script: |
            set -e
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app

            docker compose pull chungbazi-app
            docker compose up -d --no-deps chungbazi-app

            docker image prune -f
