name: 🐛 버그 리포트
description: 버그가 발생했을 때 사용하는 템플릿입니다.
title: "fix: "
labels: ["🐛bug"]
assignees: []

body:
  - type: textarea
    id: bug_summary
    attributes:
      label: 🐛 어떤 버그인가요?
      description: 발견된 버그를 간단하게 설명해주세요.
      placeholder: |
        예) 로그인 버튼 클릭 시 500 에러 발생
      value: "- "
    validations:
      required: true

  - type: textarea
    id: bug_scenario
    attributes:
      label: 🤷‍♂️ 어떤 상황에서 발생한 버그인가요?
      description: 가능하다면 Given-When-Then 형식으로 작성해주세요.
      placeholder: |
        **Given:** 로그인 페이지에 접속한 상태에서  
        **When:** 로그인 버튼을 클릭했을 때  
        **Then:** 메인 페이지로 이동해야 하지만 500 에러 발생
      value: "> "
    validations:
      required: true

  - type: textarea
    id: expected_result
    attributes:
      label: 🤔 예상 결과
      description: 기대했던 정상 동작을 설명해주세요.
      placeholder: |
        예) 로그인 버튼 클릭 시 정상적으로 메인 페이지로 이동
      value: "- "
    validations:
      required: false