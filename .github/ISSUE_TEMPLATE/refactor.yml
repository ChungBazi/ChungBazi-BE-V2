name: ♻️ 리팩토링
description: 리팩토링 작업을 기록하는 템플릿입니다.
title: "refactor: "
labels: ["♻️refactor"]
assignees: []

body:
  - type: textarea
    id: target
    attributes:
      label: 📌 리팩토링 대상
      description: 어떤 기능/모듈을 리팩토링했는지 명확히 작성해주세요.
      placeholder: |
        예) UserService 회원가입 로직
      value: "- "
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 🛠️ 리팩토링 사유
      description: 리팩토링을 하게 된 배경이나 필요성을 간단히 설명해주세요.
      placeholder: |
        예) 코드 중복 제거 및 테스트 용이성 향상
      value: "- "
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 📝 작업 상세 내용
      description: 주요 변경 사항을 체크리스트 형식으로 정리해주세요.
      placeholder: |
        - [ ] 중복된 로직 분리
        - [ ] 메서드 네이밍 개선
        - [ ] 단위 테스트 보강
      value: "- [ ] "
    validations:
      required: false