name: ✨ 기능 추가
description: 새로운 기능을 추가할 때 사용하는 템플릿입니다.
title: "feat: "
labels: ["✨feature"]
assignees: []

body:
  - type: textarea
    id: summary
    attributes:
      label: 📌 어떤 기능인가요?
      description: 추가하려는 기능에 대해 간결하게 설명해주세요.
      placeholder: |
        예) 사용자 회원가입, 로그인 기능 구현
      value: "- "
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 📝 작업 상세 내용
      description: 구현해야 할 작업 항목을 체크리스트로 작성해주세요.
      placeholder: |
        - [ ] 사용자 로그인 API
        - [ ] 사용자 온보딩 API
      value: "- [ ] "
    validations:
      required: false